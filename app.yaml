command: ["uvicorn", "server.app:combined_app", "--host", "0.0.0.0", "--port", "8000"]

# Disable OAuth for /mcp endpoint to allow cross-app API calls
# Auth is handled internally via x-forwarded-access-token header
no_auth_paths:
  - "/mcp"

env:
  - name: CDM_CATALOG
    value: "cortex_dev_catalog"
  - name: CDM_SCHEMA
    value: "0000_ram"
  - name: CDM_WAREHOUSE_ID
    value: "0473e5322360c662"
  - name: CDM_KB_LOCAL_DIR
    value: "knowledge_base"
  - name: CDM_NOTEBOOK_PATH_PREFIX
    value: "/Workspace/Users/${app.owner}/cdm-tools-mcp-server/notebooks"
